<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abitte - Painel de Gestão</title>
    <style>
        :root {
            --primary: #0f172a; --secondary: #475569; --accent: #2563eb;
            --bg-main: #f1f5f9; --bg-card: #ffffff; --border: #e2e8f0;
            --text-dark: #0f172a; --text-muted: #64748b;
            --success: #10b981; --warning: #f97316; --danger: #ef4444;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: var(--bg-main); color: var(--text-dark); padding: 30px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        
        .brand-area { display: flex; align-items: center; gap: 15px; }
        .company-logo { max-height: 50px; width: auto; object-fit: contain; display: none; } 
        h1 { font-size: 1.75rem; color: var(--primary); font-weight: 700; margin: 0;}
        
        .btn-primary { background-color: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-primary:active { transform: translateY(1px); }
        .btn-secondary { background-color: var(--secondary); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-secondary:hover { background-color: #334155; }
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: flex-start;}
        .card-title { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-value { font-size: 2rem; font-weight: 800; margin-top: 8px; color: var(--primary); }
        
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .filter-select { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border); font-weight: 600; color: var(--primary); outline: none; cursor: pointer; background: white;}
        
        .main-content { margin-bottom: 30px; }
        .table-container { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; box-shadow: var(--shadow); padding-bottom: 10px; position: relative; }
        table { width: 100%; border-collapse: collapse; text-align: left; white-space: nowrap; min-width: 1200px; }
        
        th { background-color: #f8fafc; border-bottom: 2px solid var(--border); padding: 16px 12px; vertical-align: top; }
        .th-content { display: flex; flex-direction: column; gap: 10px; }
        .th-title { font-weight: 700; color: var(--secondary); font-size: 0.80rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .header-filter { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 0.8rem; outline: none; background: #fff; color: var(--text-dark); cursor: pointer; transition: border-color 0.2s;}
        .header-filter:focus { border-color: var(--accent); }
        input.header-filter { cursor: text; }
        
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 0.9rem; background-color: var(--bg-card);}
        tbody tr { cursor: pointer; transition: background 0.2s; }
        tbody tr:hover td { background-color: #f1f5f9; }

        .linha-hoje td { background-color: #fffbeb !important; }
        .linha-hoje td:first-child { border-left: 4px solid var(--warning); }
        .tag-hoje { color: var(--warning); font-size: 0.7rem; font-weight: 800; animation: piscar 1.5s infinite; }
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .inline-select { padding: 6px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; border: 1px solid transparent; cursor: pointer; outline: none; font-family: inherit; transition: all 0.2s; width: 100%; max-width: 120px; }
        .inline-select:hover { filter: brightness(0.95); border-color: var(--border); }
        
        .bg-pendente { background-color: #fef3c7; color: #d97706; }
        .bg-andamento { background-color: #dbeafe; color: var(--accent); }
        .bg-concluido { background-color: #d1fae5; color: var(--success); }
        .bg-atrasado { background-color: #fee2e2; color: var(--danger); }

        .prio-baixa { background-color: #f1f5f9; color: var(--secondary); border: 1px solid var(--border); }
        .prio-media { background-color: #fef3c7; color: #d97706; }
        .prio-alta { background-color: #fee2e2; color: var(--danger); border: 1px solid #f87171; }
        
        .timeline-cell { width: 200px; min-width: 150px; }
        .timeline-wrapper { position: relative; width: 100%; height: 22px; background-color: #e2e8f0; border-radius: 6px; overflow: hidden; }
        .timeline-bar { position: absolute; height: 100%; border-radius: 6px; top: 0; transition: width 0.3s, left 0.3s; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bar-pendente { background-color: #f59e0b; }
        .bar-andamento { background-color: #3b82f6; }
        .bar-concluido { background-color: #10b981; }
        .bar-atrasado { background-color: #ef4444; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px;}
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 650px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column;}
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .close-btn { background: none; border: none; font-size: 1.75rem; cursor: pointer; color: var(--secondary); }
        .close-btn:hover { color: var(--danger); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .form-group.full { grid-column: 1 / -1; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; transition: border-color 0.15s; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; }
        textarea { resize: vertical; min-height: 80px; }
        
        .actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 15px; }
        .btn-outline { background: white; border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600;}
        .btn-outline:hover { background-color: #f1f5f9; }
        .delete-btn-sm { background-color: #fee2e2; color: var(--danger); border: none; padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }

        .historico-container { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; max-height: 200px; overflow-y: auto; }
        .historico-item { border-bottom: 1px dashed var(--border); padding-bottom: 10px; margin-bottom: 10px; }
        .historico-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        .historico-data { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-bottom: 4px;}
        .historico-texto { font-size: 0.85rem; color: var(--text-dark); white-space: pre-wrap;}
        .empty-history { font-size: 0.85rem; color: var(--text-muted); font-style: italic; }

        .config-section { border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .config-section h3 { font-size: 1.1rem; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 5px;}
        .config-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .config-list { list-style: none; max-height: 150px; overflow-y: auto; }
        .config-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--bg-main); margin-bottom: 5px; border-radius: 6px; font-size: 0.9rem; font-weight: 500;}
        .btn-del-config { background: none; border: none; color: var(--danger); font-size: 1.2rem; cursor: pointer; font-weight: bold;}
        .discreet-upload { cursor: pointer; font-size: 0.7rem; color: #cbd5e1; transition: color 0.2s; font-weight: normal; }
        .discreet-upload:hover { color: var(--accent); }

        /* =========================================================
           ENGENHARIA RESPONSIVA (MOBILE) - Executado em telas < 768px
           ========================================================= */
        @media (max-width: 768px) {
            body { padding: 15px; } /* Reduz respiro lateral no mobile */
            
            /* Cabeçalho empilhado */
            .header { flex-direction: column; align-items: flex-start; gap: 20px; border-bottom: none; }
            .header-actions { flex-direction: column; width: 100%; align-items: stretch; gap: 10px; }
            .btn-primary, .btn-secondary, .filter-select { width: 100%; text-align: center; }
            
            /* Dashboard ajustado para 2 colunas no celular */
            .dashboard { grid-template-columns: 1fr 1fr; }
            
            /* COLUNA CONGELADA (Sticky Column) para a tabela */
            /* Garante que o nome da Tarefa fique visível ao fazer scroll no Gantt */
            th:first-child, td:first-child {
                position: sticky;
                left: 0;
                z-index: 2;
                box-shadow: 3px 0px 5px rgba(0,0,0,0.05); /* Sombra para indicar que há conteúdo atrás */
                background-clip: padding-box;
            }
            th:first-child { background-color: #f8fafc; z-index: 3; }
            td:first-child { background-color: var(--bg-card); }
            
            /* Ajustes nos modais para telas pequenas */
            .modal-content { padding: 20px; width: 100%; margin: 0; }
            .form-grid { grid-template-columns: 1fr; gap: 15px;}
            .form-group.full { grid-column: auto; }
            .actions { flex-direction: column-reverse; gap: 10px; }
            .actions button { width: 100%; }
            .modal-header h2 { font-size: 1.25rem; }
            
            /* Ajuste no rodapé das configurações */
            #modalConfig .actions { flex-direction: column; align-items: stretch; }
            #modalConfig .actions > div { text-align: center; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-area">
            <img id="logoPrincipal" src="" alt="Logo Empresa" class="company-logo">
            <h1 id="textoPrincipal">Painel de Gestão</h1>
        </div>
        <div class="header-actions">
            <select id="filtroData" class="filter-select" onchange="window.aplicarFiltro()">
                <option value="todas">Período: Completo</option>
                <option value="hoje">📅 Período: Hoje</option>
                <option value="7dias">Período: Próx 7 Dias</option>
                <option value="15dias">Período: Próx 15 Dias</option>
            </select>
            <button class="btn-secondary" onclick="window.abrirModal('modalConfig')">⚙️ Configurações</button>
            <button class="btn-primary" onclick="window.abrirModal('modalCadastro')">+ Nova Tarefa</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="card"><span class="card-title" style="color: var(--danger)">Atrasadas</span><span class="card-value" id="dashAtrasado">0</span></div>
        <div class="card"><span class="card-title" style="color: var(--warning)">Vencem Hoje</span><span class="card-value" id="dashHoje">0</span></div>
        <div class="card"><span class="card-title" style="color: var(--accent)">Em 7 Dias</span><span class="card-value" id="dash7Dias">0</span></div>
        <div class="card"><span class="card-title" style="color: #6366f1">Em 15 Dias</span><span class="card-value" id="dash15Dias">0</span></div>
        <div class="card"><span class="card-title" style="color: var(--success)">Concluídas</span><span class="card-value" id="dashConcluido">0</span></div>
    </div>

    <div class="main-content">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 20%; min-width: 200px;">
                            <div class="th-content">
                                <span class="th-title">Tarefa</span>
                                <input type="text" id="filtroNome" class="header-filter" placeholder="Buscar..." onkeyup="window.aplicarFiltro()">
                            </div>
                        </th>
                        <th style="width: 13%;">
                            <div class="th-content">
                                <span class="th-title">Obra</span>
                                <select id="filtroObra" class="header-filter" onchange="window.aplicarFiltro()">
                                </select>
                            </div>
                        </th>
                        <th style="width: 13%;">
                            <div class="th-content">
                                <span class="th-title">Setor</span>
                                <select id="filtroSetor" class="header-filter" onchange="window.aplicarFiltro()">
                                </select>
                            </div>
                        </th>
                        <th style="width: 9%;">
                            <div class="th-content">
                                <span class="th-title">Início</span>
                                <div style="height: 33px;"></div> 
                            </div>
                        </th>
                        <th style="width: 9%;">
                            <div class="th-content">
                                <span class="th-title">Término</span>
                                <div style="height: 33px;"></div> 
                            </div>
                        </th>
                        <th style="width: 10%;">
                            <div class="th-content">
                                <span class="th-title">Prioridade</span>
                                <select id="filtroPrioridade" class="header-filter" onchange="window.aplicarFiltro()">
                                    <option value="">Todas</option>
                                    <option value="Alta">Alta</option>
                                    <option value="Média">Média</option>
                                    <option value="Baixa">Baixa</option>
                                </select>
                            </div>
                        </th>
                        <th style="width: 11%;">
                            <div class="th-content">
                                <span class="th-title">Status</span>
                                <select id="filtroStatus" class="header-filter" onchange="window.aplicarFiltro()">
                                    <option value="">Todos</option>
                                    <option value="Pendente">Pendente</option>
                                    <option value="Em Andamento">Em Andamento</option>
                                    <option value="Concluído">Concluído</option>
                                    <option value="Atrasado">Atrasado</option>
                                </select>
                            </div>
                        </th>
                        <th class="timeline-cell" style="width: 11%;">
                            <div class="th-content">
                                <span class="th-title">Cronograma</span>
                                <div style="height: 33px;"></div> 
                            </div>
                        </th>
                        <th style="width: 4%;">
                            <div class="th-content">
                                <span class="th-title">Ações</span>
                                <div style="height: 33px;"></div> 
                            </div>
                        </th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo">
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalCadastro">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nova Tarefa</h2>
                <button class="close-btn" onclick="window.fecharModal('modalCadastro')">&times;</button>
            </div>
            <form id="formTarefa">
                <div class="form-grid">
                    <div class="form-group full"><label>Nome da Tarefa</label><input type="text" id="nome" required></div>
                    <div class="form-group"><label>Obra / Projeto</label><select id="obra" required></select></div>
                    <div class="form-group"><label>Setor</label><select id="setor" required></select></div>
                    <div class="form-group"><label>Responsável</label><input type="text" id="responsavel" required></div>
                    <div class="form-group">
                        <label>Prioridade</label>
                        <select id="prioridade" required>
                            <option value="Baixa">Baixa</option>
                            <option value="Média" selected>Média</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status Inicial</label>
                        <select id="status" required>
                            <option value="Pendente">Pendente</option>
                            <option value="Em Andamento">Em Andamento</option>
                            <option value="Concluído">Concluído</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Data de Início</label><input type="date" id="inicio" required></div>
                    <div class="form-group"><label>Data de Término</label><input type="date" id="termino" required></div>
                </div>
                <div class="actions">
                    <button type="button" class="btn-outline" onclick="window.fecharModal('modalCadastro')">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Tarefa</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalConfig">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>Cadastros Base do Sistema</h2>
                <button class="close-btn" onclick="window.fecharModal('modalConfig')">&times;</button>
            </div>
            <div class="form-grid">
                <div class="config-section">
                    <h3>Obras Cadastradas</h3>
                    <div class="config-input-group">
                        <input type="text" id="novaObraInput" placeholder="Nome da Obra...">
                        <button class="btn-primary" onclick="window.adicionarObra()">Adicionar</button>
                    </div>
                    <ul class="config-list" id="listaObrasConfig"></ul>
                </div>
                <div class="config-section">
                    <h3>Setores Cadastrados</h3>
                    <div class="config-input-group">
                        <input type="text" id="novoSetorInput" placeholder="Nome do Setor...">
                        <button class="btn-primary" onclick="window.adicionarSetor()">Adicionar</button>
                    </div>
                    <ul class="config-list" id="listaSetoresConfig"></ul>
                </div>
            </div>
            <div class="actions" style="justify-content: space-between; align-items: flex-end;">
                <div>
                    <label for="logoUploadInput" class="discreet-upload">[ Identidade Visual ]</label>
                    <input type="file" id="logoUploadInput" accept="image/*" style="display: none;" onchange="window.importarLogo(event)">
                </div>
                <button class="btn-outline" onclick="window.fecharModal('modalConfig')">Fechar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalDetalhes">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detalheNome">Histórico</h2>
                <button class="close-btn" onclick="window.fecharModal('modalDetalhes')">&times;</button>
            </div>
            <label>Registros Anteriores</label>
            <div class="historico-container" id="listaHistorico"></div>
            <div class="form-group full">
                <label>Nova Anotação</label>
                <textarea id="novaAnotacao" placeholder="Digite uma atualização..."></textarea>
            </div>
            <div class="actions">
                <input type="hidden" id="detalheId">
                <button class="btn-outline" onclick="window.fecharModal('modalDetalhes')">Fechar</button>
                <button class="btn-primary" onclick="window.salvarAnotacao()">Adicionar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCvLop2eyIFkDvkH7zWbD8MKcqoW2gHazg",
            authDomain: "controle-de-atividades-d961e.firebaseapp.com",
            projectId: "controle-de-atividades-d961e",
            storageBucket: "controle-de-atividades-d961e.firebasestorage.app",
            messagingSenderId: "208986501489",
            appId: "1:208986501489:web:ab93bfbf679fd43f8986d0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const tarefasCol = collection(db, 'tarefas');
        const obrasCol = collection(db, 'obras');
        const setoresCol = collection(db, 'setores');
        const configDocRef = doc(db, 'sistema', 'configuracoes');

        let tarefasLocal = [];
        let obrasLocal = [];
        let setoresLocal = [];

        onSnapshot(configDocRef, (docSnap) => {
            if (docSnap.exists() && docSnap.data().logoBase64) {
                const img = document.getElementById('logoPrincipal');
                img.src = docSnap.data().logoBase64;
                img.style.display = 'block';
            }
        });

        window.importarLogo = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    await setDoc(configDocRef, { logoBase64: e.target.result }, { merge: true });
                    alert('Identidade visual atualizada com sucesso!');
                } catch (error) {
                    console.error("Erro ao salvar logo:", error);
                    alert('Erro ao salvar. Tente uma imagem mais leve.');
                }
            };
            reader.readAsDataURL(file);
        };

        onSnapshot(obrasCol, (snapshot) => {
            obrasLocal = snapshot.docs.map(doc => ({ id: doc.id, nome: doc.data().nome }));
            atualizarListasDeConfiguracao();
        });

        onSnapshot(setoresCol, (snapshot) => {
            setoresLocal = snapshot.docs.map(doc => ({ id: doc.id, nome: doc.data().nome }));
            atualizarListasDeConfiguracao();
        });

        function atualizarListasDeConfiguracao() {
            obrasLocal.sort((a, b) => a.nome.localeCompare(b.nome));
            setoresLocal.sort((a, b) => a.nome.localeCompare(b.nome));

            document.getElementById('filtroObra').innerHTML = '<option value="">Todas as Obras</option>' + 
                obrasLocal.map(o => `<option value="${o.nome}">${o.nome}</option>`).join('');
                
            document.getElementById('filtroSetor').innerHTML = '<option value="">Todos os Setores</option>' + 
                setoresLocal.map(s => `<option value="${s.nome}">${s.nome}</option>`).join('');

            document.getElementById('obra').innerHTML = obrasLocal.length > 0 
                ? obrasLocal.map(o => `<option value="${o.nome}">${o.nome}</option>`).join('')
                : '<option value="">Cadastre uma Obra primeiro</option>';
                
            document.getElementById('setor').innerHTML = setoresLocal.length > 0 
                ? setoresLocal.map(s => `<option value="${s.nome}">${s.nome}</option>`).join('')
                : '<option value="">Cadastre um Setor primeiro</option>';

            document.getElementById('listaObrasConfig').innerHTML = obrasLocal.map(o => 
                `<li class="config-item">${o.nome} <button class="btn-del-config" onclick="window.excluirObra('${o.id}')">&times;</button></li>`).join('');
                
            document.getElementById('listaSetoresConfig').innerHTML = setoresLocal.map(s => 
                `<li class="config-item">${s.nome} <button class="btn-del-config" onclick="window.excluirSetor('${s.id}')">&times;</button></li>`).join('');
                
            window.aplicarFiltro();
        }

        window.adicionarObra = async () => {
            const input = document.getElementById('novaObraInput');
            if(input.value.trim() !== '') {
                await addDoc(obrasCol, { nome: input.value.trim() });
                input.value = '';
            }
        };
        window.excluirObra = async (id) => { if(confirm('Excluir esta Obra?')) await deleteDoc(doc(db, 'obras', id)); };

        window.adicionarSetor = async () => {
            const input = document.getElementById('novoSetorInput');
            if(input.value.trim() !== '') {
                await addDoc(setoresCol, { nome: input.value.trim() });
                input.value = '';
            }
        };
        window.excluirSetor = async (id) => { if(confirm('Excluir este Setor?')) await deleteDoc(doc(db, 'setores', id)); };

        const getHojeStr = () => {
            const d = new Date();
            const ano = d.getFullYear();
            const mes = String(d.getMonth() + 1).padStart(2, '0');
            const dia = String(d.getDate()).padStart(2, '0');
            return `${ano}-${mes}-${dia}`;
        };

        onSnapshot(tarefasCol, (snapshot) => {
            tarefasLocal = [];
            const hojeStr = getHojeStr();

            snapshot.forEach((docSnap) => {
                let t = { id: docSnap.id, ...docSnap.data() };
                if (t.status !== 'Concluído' && t.termino && t.termino < hojeStr && t.status !== 'Atrasado') {
                    t.status = 'Atrasado';
                    updateDoc(doc(db, 'tarefas', t.id), { status: 'Atrasado' }).catch(console.error);
                }
                t.obra = t.obra || '-';
                t.prioridade = t.prioridade || 'Média'; 
                if(!t.historicoAnotacoes) t.historicoAnotacoes = [];
                tarefasLocal.push(t);
            });

            atualizarDashboard();
            window.aplicarFiltro(); 
        });

        function atualizarDashboard() {
            let countAtrasado = 0, countHoje = 0, count7Dias = 0, count15Dias = 0, countConcluido = 0;
            const hojeStr = getHojeStr();
            const dataHoje = new Date(hojeStr + 'T00:00:00');

            tarefasLocal.forEach(t => {
                if (t.status === 'Concluído') countConcluido++;
                else {
                    if (t.status === 'Atrasado') countAtrasado++;
                    if (t.termino) {
                        const dataTermino = new Date(t.termino + 'T00:00:00');
                        const diffDays = Math.ceil((dataTermino - dataHoje) / (1000 * 60 * 60 * 24));
                        if (diffDays === 0) countHoje++;
                        else if (diffDays > 0 && diffDays <= 7) count7Dias++;
                        else if (diffDays > 7 && diffDays <= 15) count15Dias++;
                    }
                }
            });

            document.getElementById('dashAtrasado').innerText = countAtrasado;
            document.getElementById('dashHoje').innerText = countHoje;
            document.getElementById('dash7Dias').innerText = count7Dias;
            document.getElementById('dash15Dias').innerText = count15Dias;
            document.getElementById('dashConcluido').innerText = countConcluido;
        }

        window.aplicarFiltro = () => { renderizarTabela(); };

        const obterTarefasFiltradas = () => {
            const filtroData = document.getElementById('filtroData').value;
            const filtroNome = document.getElementById('filtroNome').value.toLowerCase();
            const filtroObra = document.getElementById('filtroObra').value;
            const filtroSetor = document.getElementById('filtroSetor').value;
            const filtroPrioridade = document.getElementById('filtroPrioridade').value;
            const filtroStatus = document.getElementById('filtroStatus').value;
            const dataHoje = new Date(getHojeStr() + 'T00:00:00');

            return tarefasLocal.filter(t => {
                if (filtroNome && !(t.nome || '').toLowerCase().includes(filtroNome)) return false;
                if (filtroObra && t.obra !== filtroObra) return false;
                if (filtroSetor && t.setor !== filtroSetor) return false;
                if (filtroPrioridade && t.prioridade !== filtroPrioridade) return false;
                if (filtroStatus && t.status !== filtroStatus) return false;

                if (filtroData !== 'todas') {
                    if (!t.termino) return false;
                    const diffDays = Math.ceil((new Date(t.termino + 'T00:00:00') - dataHoje) / (1000 * 60 * 60 * 24)); 
                    if (filtroData === 'hoje' && diffDays !== 0) return false;
                    if (filtroData === '7dias' && (diffDays < 0 || diffDays > 7)) return false;
                    if (filtroData === '15dias' && (diffDays < 0 || diffDays > 15)) return false;
                }
                return true;
            });
        };

        const formatarData = (dataISO) => {
            if (!dataISO) return '-';
            const partes = dataISO.split('-');
            return partes.length === 3 ? `${partes[2]}/${partes[1]}/${partes[0]}` : dataISO;
        };

        const getStatusSelect = (id, statusAtual) => {
            const classes = { 'Pendente': 'bg-pendente', 'Em Andamento': 'bg-andamento', 'Concluído': 'bg-concluido', 'Atrasado': 'bg-atrasado' };
            const classeAtual = classes[statusAtual] || 'bg-pendente';
            return `
                <select class="inline-select ${classeAtual}" onchange="window.atualizarStatusRapido('${id}', this.value)">
                    <option value="Pendente" ${statusAtual === 'Pendente' ? 'selected' : ''}>Pendente</option>
                    <option value="Em Andamento" ${statusAtual === 'Em Andamento' ? 'selected' : ''}>Em Andamento</option>
                    <option value="Concluído" ${statusAtual === 'Concluído' ? 'selected' : ''}>Concluído</option>
                    <option value="Atrasado" ${statusAtual === 'Atrasado' ? 'selected' : ''}>Atrasado</option>
                </select>`;
        };

        const getPrioridadeSelect = (id, prioridadeAtual) => {
            const classes = { 'Baixa': 'prio-baixa', 'Média': 'prio-media', 'Alta': 'prio-alta' };
            const classeAtual = classes[prioridadeAtual] || 'prio-media';
            return `
                <select class="inline-select ${classeAtual}" onchange="window.atualizarPrioridadeRapido('${id}', this.value)">
                    <option value="Baixa" ${prioridadeAtual === 'Baixa' ? 'selected' : ''}>Baixa</option>
                    <option value="Média" ${prioridadeAtual === 'Média' ? 'selected' : ''}>Média</option>
                    <option value="Alta" ${prioridadeAtual === 'Alta' ? 'selected' : ''}>Alta</option>
                </select>`;
        };

        const getLimitesCronograma = (tarefas) => {
            let minTime = new Date('2099-01-01').getTime();
            let maxTime = new Date('2000-01-01').getTime();
            tarefas.forEach(t => {
                if(t.inicio && t.termino) {
                    const st = new Date(t.inicio + 'T00:00:00').getTime();
                    const en = new Date(t.termino + 'T00:00:00').getTime();
                    if(st < minTime) minTime = st;
                    if(en > maxTime) maxTime = en;
                }
            });
            if(minTime > maxTime) { minTime = Date.now(); maxTime = Date.now() + 86400000; }
            let totalSpan = maxTime - minTime;
            if(totalSpan === 0) totalSpan = 86400000; 
            return { minTime, totalSpan };
        };

        function renderizarTabela() {
            const tbody = document.getElementById('tabelaCorpo');
            tbody.innerHTML = '';
            
            const tarefasParaExibir = obterTarefasFiltradas();
            const hojeStr = getHojeStr();
            const limites = getLimitesCronograma(tarefasParaExibir);

            tarefasParaExibir.forEach(tarefa => {
                const isVenceHoje = (tarefa.termino === hojeStr && tarefa.status !== 'Concluído');
                const tr = document.createElement('tr');
                if(isVenceHoje) tr.className = 'linha-hoje'; 
                
                tr.onclick = (e) => { 
                    if(!['SELECT', 'OPTION', 'BUTTON', 'INPUT'].includes(e.target.tagName)) {
                        window.abrirDetalhes(tarefa.id); 
                    }
                };

                let barHtml = '<div class="timeline-wrapper"><span style="font-size: 0.65rem; color: #94a3b8; position: absolute; left: 8px; top: 3px;">Sem datas</span></div>';
                if(tarefa.inicio && tarefa.termino) {
                    const st = new Date(tarefa.inicio + 'T00:00:00').getTime();
                    const en = new Date(tarefa.termino + 'T00:00:00').getTime();
                    
                    let leftPct = ((st - limites.minTime) / limites.totalSpan) * 100;
                    let widthPct = ((en - st) / limites.totalSpan) * 100;
                    
                    if (widthPct < 3) widthPct = 3; 
                    if (leftPct + widthPct > 100) leftPct = 100 - widthPct;

                    const corBarra = { 'Pendente': 'bar-pendente', 'Em Andamento': 'bar-andamento', 'Concluído': 'bar-concluido', 'Atrasado': 'bar-atrasado' }[tarefa.status] || 'bar-pendente';

                    barHtml = `<div class="timeline-wrapper"><div class="timeline-bar ${corBarra}" style="left: ${leftPct}%; width: ${widthPct}%;"></div></div>`;
                }
                
                tr.innerHTML = `
                    <td style="font-weight: 500;">${tarefa.nome || 'Sem nome'}</td>
                    <td style="font-weight: 600; color: var(--secondary);">${tarefa.obra || '-'}</td>
                    <td>${tarefa.setor || '-'}</td>
                    <td>${formatarData(tarefa.inicio)}</td>
                    <td>${formatarData(tarefa.termino)}${isVenceHoje ? '<br><span class="tag-hoje">VENCE HOJE</span>' : ''}</td>
                    <td>${getPrioridadeSelect(tarefa.id, tarefa.prioridade)}</td>
                    <td>${getStatusSelect(tarefa.id, tarefa.status)}</td>
                    <td class="timeline-cell">${barHtml}</td>
                    <td><button class="delete-btn-sm" onclick="window.excluirTarefa('${tarefa.id}')">Excluir</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.abrirModal = (id) => document.getElementById(id).style.display = 'flex';
        window.fecharModal = (id) => document.getElementById(id).style.display = 'none';

        document.getElementById('formTarefa').addEventListener('submit', async function(e) {
            e.preventDefault();
            if(obrasLocal.length === 0 || setoresLocal.length === 0) {
                alert("Por favor, acesse as 'Configurações' e cadastre pelo menos uma Obra e um Setor antes de criar tarefas.");
                return;
            }
            const novaTarefa = {
                nome: document.getElementById('nome').value,
                obra: document.getElementById('obra').value,
                setor: document.getElementById('setor').value,
                responsavel: document.getElementById('responsavel').value,
                prioridade: document.getElementById('prioridade').value,
                inicio: document.getElementById('inicio').value,
                termino: document.getElementById('termino').value,
                status: document.getElementById('status').value,
                historicoAnotacoes: [] 
            };
            await addDoc(tarefasCol, novaTarefa);
            this.reset();
            window.fecharModal('modalCadastro');
        });

        window.atualizarStatusRapido = async (id, novoStatus) => { await updateDoc(doc(db, 'tarefas', id), { status: novoStatus }); };
        window.atualizarPrioridadeRapido = async (id, novaPrioridade) => { await updateDoc(doc(db, 'tarefas', id), { prioridade: novaPrioridade }); };

        window.abrirDetalhes = (id) => {
            const tarefa = tarefasLocal.find(t => t.id === id);
            if (!tarefa) return;
            document.getElementById('detalheId').value = tarefa.id;
            document.getElementById('detalheNome').innerText = `Obra: ${tarefa.obra || '-'} | ${tarefa.nome || 'Tarefa'}`;
            document.getElementById('novaAnotacao').value = '';
            const container = document.getElementById('listaHistorico');
            container.innerHTML = tarefa.historicoAnotacoes?.length 
                ? [...tarefa.historicoAnotacoes].reverse().map(item => `
                    <div class="historico-item">
                        <div class="historico-data">${new Date(item.data).toLocaleDateString('pt-BR')} às ${new Date(item.data).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</div>
                        <div class="historico-texto">${item.texto}</div>
                    </div>`).join('')
                : '<div class="empty-history">Nenhuma anotação registrada.</div>';
            window.abrirModal('modalDetalhes');
        };

        window.salvarAnotacao = async () => {
            const id = document.getElementById('detalheId').value;
            const novaObs = document.getElementById('novaAnotacao').value.trim();
            if(!novaObs) { window.fecharModal('modalDetalhes'); return; }
            const tarefa = tarefasLocal.find(t => t.id === id);
            let historico = tarefa.historicoAnotacoes || [];
            historico.push({ data: new Date().toISOString(), texto: novaObs });
            await updateDoc(doc(db, 'tarefas', id), { historicoAnotacoes: historico });
            window.fecharModal('modalDetalhes');
        };

        window.excluirTarefa = async (id) => { if(confirm('Excluir permanentemente esta atividade?')) await deleteDoc(doc(db, 'tarefas', id)); };
    </script>
</body>
</html>
